<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">
  <defs>
    <linearGradient id="bgGradH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67E8F9" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#67E8F9" stop-opacity="0"/>
    </radialGradient>

    <!-- Mask that fades chaos out behind the text and to the right -->
    <linearGradient id="chaosFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="70%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <mask id="chaosMask">
      <rect width="1600" height="500" fill="url(#chaosFade)"/>
    </mask>

    <!-- Soft glow around text so it reads cleanly on top of the gradient -->
    <radialGradient id="textHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4338CA" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#4338CA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4338CA" stop-opacity="0"/>
    </radialGradient>

    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1.2" fill="#FFFFFF" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bgGradH)"/>
  <rect width="1600" height="500" fill="url(#dots)"/>

  <!-- CHAOS (left): dense tangled network, fades out before the text -->
  <g mask="url(#chaosMask)">
    <!-- Tangled connecting lines -->
    <g stroke="#67E8F9" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.55">
      <path d="M 80 90   C 260 40,  380 180, 540 110"/>
      <path d="M 80 380  C 220 440, 380 360, 520 420"/>
      <path d="M 160 200 C 320 280, 400 120, 560 240"/>
      <path d="M 60 320  C 240 180, 380 380, 520 310"/>
      <path d="M 240 60  C 380 200, 300 380, 420 470"/>
      <path d="M 420 120 C 600 80,  540 340, 700 260"/>
      <path d="M 500 380 C 360 260, 680 460, 800 340"/>
      <path d="M 580 210 C 420 140, 760 300, 640 440"/>
      <path d="M 40 180  C 180 260, 100 360, 260 440"/>
      <path d="M 320 40  C 440 260, 200 380, 480 420"/>
      <path d="M 120 440 C 320 280, 380 180, 520 260"/>
      <path d="M 220 100 C 460 360, 120 300, 600 160"/>
    </g>

    <!-- Node glows (left chaos) -->
    <g>
      <circle cx="80"  cy="90"  r="50" fill="url(#nodeGlow)"/>
      <circle cx="240" cy="60"  r="45" fill="url(#nodeGlow)"/>
      <circle cx="160" cy="200" r="40" fill="url(#nodeGlow)"/>
      <circle cx="60"  cy="320" r="50" fill="url(#nodeGlow)"/>
      <circle cx="80"  cy="380" r="40" fill="url(#nodeGlow)"/>
      <circle cx="260" cy="440" r="45" fill="url(#nodeGlow)"/>
      <circle cx="320" cy="40"  r="40" fill="url(#nodeGlow)"/>
      <circle cx="420" cy="120" r="45" fill="url(#nodeGlow)"/>
      <circle cx="560" cy="240" r="50" fill="url(#nodeGlow)"/>
      <circle cx="500" cy="380" r="40" fill="url(#nodeGlow)"/>
      <circle cx="380" cy="300" r="40" fill="url(#nodeGlow)"/>
      <circle cx="640" cy="440" r="45" fill="url(#nodeGlow)"/>
    </g>

    <!-- Nodes (left chaos) -->
    <g>
      <circle cx="80"  cy="90"  r="16" fill="#22D3EE"/>
      <circle cx="80"  cy="90"  r="7"  fill="#FFFFFF"/>
      <circle cx="240" cy="60"  r="10" fill="#22D3EE"/>
      <circle cx="160" cy="200" r="12" fill="#22D3EE"/>
      <circle cx="160" cy="200" r="5"  fill="#FFFFFF"/>
      <circle cx="60"  cy="320" r="18" fill="#22D3EE"/>
      <circle cx="60"  cy="320" r="8"  fill="#FFFFFF"/>
      <circle cx="80"  cy="380" r="9"  fill="#67E8F9"/>
      <circle cx="260" cy="440" r="14" fill="#22D3EE"/>
      <circle cx="260" cy="440" r="6"  fill="#FFFFFF"/>
      <circle cx="320" cy="40"  r="10" fill="#67E8F9"/>
      <circle cx="420" cy="120" r="11" fill="#22D3EE"/>
      <circle cx="560" cy="240" r="15" fill="#22D3EE"/>
      <circle cx="560" cy="240" r="6"  fill="#FFFFFF"/>
      <circle cx="500" cy="380" r="10" fill="#22D3EE"/>
      <circle cx="380" cy="300" r="9"  fill="#67E8F9"/>
      <circle cx="640" cy="440" r="12" fill="#22D3EE"/>
      <circle cx="640" cy="440" r="5"  fill="#FFFFFF"/>
    </g>
  </g>

  <!-- Halo behind the text so it reads cleanly -->
  <ellipse cx="800" cy="250" rx="420" ry="180" fill="url(#textHalo)"/>

  <!-- "Router" as path (self-contained, no font dependency) -->
  <g transform="translate(477 320)" filter="url(#textShadow)">
    <path fill="url(#textGrad)" d="M 9.77 -0 L 9.77 -140.92 L 73.24 -140.92 Q 91.41 -140.92 103.86 -135.35 Q 116.31 -129.79 122.75 -119.04 Q 129.20 -108.30 129.20 -92.68 L 129.20 -92.48 Q 129.20 -79.30 123.00 -68.36 Q 116.80 -57.42 106.54 -52.44 L 133.30 -0 L 87.01 -0 L 64.75 -46.29 Q 64.36 -46.29 63.87 -46.29 Q 63.38 -46.29 62.89 -46.29 L 51.17 -46.29 L 51.17 -0 Z M 51.17 -75.49 L 68.46 -75.49 Q 76.86 -75.49 81.93 -80.27 Q 87.01 -85.06 87.01 -92.77 L 87.01 -92.97 Q 87.01 -100.68 81.84 -105.52 Q 76.66 -110.35 68.46 -110.35 L 51.17 -110.35 Z M 189.70 2.34 Q 172.03 2.34 159.33 -4.25 Q 146.64 -10.84 139.85 -23.39 Q 133.06 -35.94 133.06 -53.81 L 133.06 -54.00 Q 133.06 -71.58 140.04 -84.18 Q 147.03 -96.78 159.72 -103.47 Q 172.42 -110.16 189.70 -110.16 Q 207.09 -110.16 219.78 -103.52 Q 232.48 -96.88 239.46 -84.33 Q 246.44 -71.78 246.44 -54.00 L 246.44 -53.81 Q 246.44 -35.84 239.61 -23.29 Q 232.77 -10.74 220.07 -4.20 Q 207.38 2.34 189.70 2.34 Z M 189.80 -27.34 Q 194.78 -27.34 198.39 -30.42 Q 202.01 -33.50 203.91 -39.40 Q 205.82 -45.31 205.82 -53.81 L 205.82 -54.00 Q 205.82 -62.40 203.81 -68.31 Q 201.81 -74.22 198.20 -77.34 Q 194.59 -80.47 189.70 -80.47 Q 184.82 -80.47 181.21 -77.34 Q 177.59 -74.22 175.64 -68.31 Q 173.69 -62.40 173.69 -54.00 L 173.69 -53.81 Q 173.69 -45.31 175.59 -39.40 Q 177.50 -33.50 181.11 -30.42 Q 184.72 -27.34 189.80 -27.34 Z M 289.27 2.34 Q 277.45 2.34 269.15 -2.49 Q 260.85 -7.32 256.55 -16.50 Q 252.26 -25.68 252.26 -38.57 L 252.26 -107.81 L 292.30 -107.81 L 292.30 -47.36 Q 292.30 -39.26 296.11 -34.57 Q 299.91 -29.88 307.43 -29.88 Q 310.95 -29.88 313.78 -31.15 Q 316.61 -32.42 318.62 -34.77 Q 320.62 -37.11 321.64 -40.28 Q 322.67 -43.46 322.67 -47.27 L 322.67 -107.81 L 362.71 -107.81 L 362.71 -0 L 322.67 -0 L 322.67 -20.02 L 321.89 -20.02 Q 319.25 -12.79 314.71 -7.76 Q 310.17 -2.73 303.82 -0.20 Q 297.47 2.34 289.27 2.34 Z M 421.94 2.34 Q 401.04 2.34 391.23 -5.62 Q 381.41 -13.57 381.41 -32.62 L 381.41 -78.91 L 367.16 -78.91 L 367.16 -107.81 L 381.41 -107.81 L 381.41 -131.45 L 421.45 -131.45 L 421.45 -107.81 L 440.40 -107.81 L 440.40 -78.91 L 421.45 -78.91 L 421.45 -38.77 Q 421.45 -32.23 424.43 -29.39 Q 427.41 -26.56 433.56 -26.56 Q 435.81 -26.56 437.32 -26.71 Q 438.84 -26.86 440.40 -27.05 L 440.40 0.88 Q 437.18 1.46 432.73 1.90 Q 428.29 2.34 421.94 2.34 Z M 501.10 2.34 Q 483.62 2.34 471.02 -4.39 Q 458.42 -11.13 451.63 -23.78 Q 444.85 -36.43 444.85 -53.91 L 444.85 -54.00 Q 444.85 -71.58 451.59 -84.13 Q 458.32 -96.68 470.68 -103.42 Q 483.03 -110.16 499.83 -110.16 Q 516.63 -110.16 528.98 -103.52 Q 541.33 -96.88 548.12 -84.77 Q 554.91 -72.66 554.91 -56.25 L 554.91 -44.92 L 464.38 -44.92 L 464.38 -67.58 L 536.35 -67.58 L 517.89 -46.29 L 517.89 -61.72 Q 517.89 -68.26 515.79 -72.95 Q 513.70 -77.64 509.89 -80.13 Q 506.08 -82.62 500.90 -82.62 Q 495.73 -82.62 491.92 -80.13 Q 488.11 -77.64 486.01 -72.95 Q 483.91 -68.26 483.91 -61.72 L 483.91 -46.09 Q 483.91 -39.55 486.06 -34.86 Q 488.21 -30.18 492.21 -27.69 Q 496.21 -25.20 501.88 -25.20 Q 507.15 -25.20 510.67 -26.90 Q 514.18 -28.61 516.19 -30.86 Q 518.19 -33.11 518.68 -34.67 L 518.77 -34.96 L 554.42 -34.96 L 554.13 -33.69 Q 552.95 -28.42 549.73 -22.22 Q 546.51 -16.02 540.45 -10.40 Q 534.40 -4.79 524.78 -1.22 Q 515.16 2.34 501.10 2.34 Z M 561.11 -0 L 561.11 -107.81 L 601.15 -107.81 L 601.15 -88.48 L 601.93 -88.48 Q 603.98 -99.02 610.09 -104.59 Q 616.19 -110.16 625.86 -110.16 Q 628.40 -110.16 630.84 -109.77 Q 633.28 -109.38 635.53 -108.59 L 635.53 -74.90 Q 632.99 -75.98 630.01 -76.56 Q 627.03 -77.15 623.91 -77.15 Q 616.39 -77.15 611.31 -74.61 Q 606.23 -72.07 603.69 -67.04 Q 601.15 -62.01 601.15 -54.49 L 601.15 -0 Z"/>
  </g>

  <!-- ORDER (right): one clean route, evenly spaced nodes -->
  <g opacity="0.95">
    <line x1="1060" y1="250" x2="1540" y2="250"
          stroke="#67E8F9" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

    <!-- Four orderly nodes, same size, on the same baseline -->
    <circle cx="1080" cy="250" r="50" fill="url(#nodeGlow)"/>
    <circle cx="1230" cy="250" r="50" fill="url(#nodeGlow)"/>
    <circle cx="1380" cy="250" r="50" fill="url(#nodeGlow)"/>
    <circle cx="1530" cy="250" r="50" fill="url(#nodeGlow)"/>

    <circle cx="1080" cy="250" r="16" fill="#22D3EE"/>
    <circle cx="1080" cy="250" r="7"  fill="#FFFFFF"/>
    <circle cx="1230" cy="250" r="16" fill="#22D3EE"/>
    <circle cx="1230" cy="250" r="7"  fill="#FFFFFF"/>
    <circle cx="1380" cy="250" r="16" fill="#22D3EE"/>
    <circle cx="1380" cy="250" r="7"  fill="#FFFFFF"/>
    <circle cx="1530" cy="250" r="16" fill="#22D3EE"/>
    <circle cx="1530" cy="250" r="7"  fill="#FFFFFF"/>
  </g>
</svg>
